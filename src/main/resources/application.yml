spring:
  application:
    name: smarthealth-cahosp

  # Carrega o arquivo .env (KEY=value) na raiz, se existir. Variaveis de ambiente
  # reais tem precedencia sobre o .env.
  config:
    import: optional:file:.env[.properties]

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # NUNCA usar update/create — o schema so muda via migrations Flyway.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${PORT:3002}
  servlet:
    context-path: /api

# Documentacao da API — Swagger UI em /api/swagger-ui/index.html
springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
  api-docs:
    path: /v3/api-docs

# Actuator — health em /api/actuator/health
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

# Parametros da aplicacao (lidos de env / .env)
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  jwt:
    secret: ${JWT_SECRET:}
    expires-in: ${JWT_EXPIRES_IN:86400000}
  admin:
    nome: ${ADMIN_NOME:Administrador CAHOSP}
    email: ${ADMIN_EMAIL:admin@cahosp.local}
    senha: ${ADMIN_SENHA:}
  integracao:
    enabled: ${INTEGRACAO_ENABLED:false}
  ia:
    # Provedores do AI Gateway (RF-INT-06). Sem chave => modo demo (resposta simulada).
    deepseek-api-key: ${DEEPSEEK_API_KEY:}
    deepseek-base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
    deepseek-modelo: ${DEEPSEEK_MODELO:deepseek-chat}
    openai-api-key: ${OPENAI_API_KEY:}
    openai-base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
    openai-modelo: ${OPENAI_MODELO:gpt-4o-mini}
    gemini-api-key: ${GEMINI_API_KEY:}
    gemini-base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
    gemini-modelo: ${GEMINI_MODELO:gemini-1.5-flash}
