# Postgres local opcional para desenvolvimento.
# Voce ja usa um Postgres externo (DB_URL no .env); este compose e so uma
# conveniencia para quem quiser subir um banco local rapidamente:
#   docker compose up -d
services:
  postgres:
    image: postgres:17-alpine
    container_name: cahosp-postgres
    environment:
      POSTGRES_DB: cahosp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - cahosp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cahosp"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  cahosp_pgdata:
